name: Corporate DevSecOps Gate

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: security-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security_audits:
    name: Pruebas de Seguridad y Calidad
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Preparar reglas corporativas de secretos (Estricto / Multi-idioma)
        shell: bash
        run: |
          cat > .gitleaks-ci.toml <<'EOF'
          title = "Corporate DevSecOps Gitleaks Config - Strict"

          [extend]
          useDefault = true

          [[rules]]
          id = "corporate-strict-hardcoded-secret"
          description = "Detects generic hardcoded credentials in English and Spanish, including short or weak values."
          regex = '''(?i)(?:secret|token|api[_-]?key|access[_-]?key|client[_-]?secret|private[_-]?key|password|passwd|pwd|llave|clave|contrasena|secreto)[A-Za-z0-9_-]*\s*[:=]\s*['"`]([A-Za-z0-9_./+=:@-]{4,})['"`]'''
          secretGroup = 1
          keywords = [
            "secret",
            "token",
            "api_key",
            "apikey",
            "access_key",
            "client_secret",
            "private_key",
            "password",
            "passwd",
            "pwd",
            "llave",
            "clave",
            "contrasena",
            "secreto"
          ]
          EOF

      - name: Escaneo de secretos hardcodeados (Gitleaks CLI)
        shell: bash
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/repo" \
            -w /repo \
            ghcr.io/gitleaks/gitleaks:v8.24.2 \
            git . --config .gitleaks-ci.toml --redact --verbose --exit-code 1

      - name: Configurar Python para Semgrep
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Analisis estatico de seguridad (Semgrep SAST)
        shell: bash
        run: |
          python -m pip install --upgrade pipx
          pipx install semgrep
          semgrep scan \
            --config p/default \
            --config p/security-audit \
            --config p/secrets \
            --error \
            --no-suppress-errors \
            --metrics=off

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validar sintaxis JavaScript
        shell: bash
        run: |
          mapfile -d '' files < <(find . \
            -type f \( -name '*.js' -o -name '*.mjs' -o -name '*.cjs' \) \
            -not -path './node_modules/*' \
            -not -path './.git/*' \
            -print0)

          if [ "${#files[@]}" -eq 0 ]; then
            echo "No se encontraron archivos JavaScript para validar."
            exit 0
          fi

          for file in "${files[@]}"; do
            node --check "$file"
          done

      - name: Auditoria de dependencias Node.js (SCA)
        shell: bash
        run: |
          if [ ! -f package.json ]; then
            echo "::notice::No existe package.json; se omite npm audit porque este repositorio no declara dependencias Node.js."
            exit 0
          fi

          if [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ]; then
            npm ci --ignore-scripts
          else
            npm install --package-lock-only --ignore-scripts
          fi

          npm audit --audit-level=high

      - name: Detectar dependencias instaladas no utilizadas
        shell: bash
        run: |
          if [ ! -f package.json ]; then
            echo "::notice::No existe package.json; se omite depcheck."
            exit 0
          fi

          npx --yes depcheck --json > depcheck-results.json

          node <<'NODE'
          const fs = require('fs');
          const report = JSON.parse(fs.readFileSync('depcheck-results.json', 'utf8'));
          const unused = [
            ...(report.dependencies || []),
            ...(report.devDependencies || []),
          ];

          if (unused.length > 0) {
            console.error('Dependencias no utilizadas detectadas:');
            for (const dependency of unused) {
              console.error(`- ${dependency}`);
            }
            process.exit(1);
          }

          console.log('No se detectaron dependencias no utilizadas.');
          NODE

      - name: Rollback automatico en main
        if: failure()
        shell: bash
        run: |
          echo "::warning::Vulnerabilidad detectada. Iniciando rollback automatico..."
          
          # Firma corporativa para el historial de Git
          git config --global user.name "DevSecOps Gate"
          git config --global user.email "ciberseguridad@casapellas.com"
          
          # Revierte el commit inyectado por el usuario
          git revert --no-edit ${{ github.sha }}
          
          # Sube la reversion a la rama main
          git push origin main
          
          echo "::notice::El codigo vulnerable ha sido revertido exitosamente."

      - name: Alertar a Ciberseguridad si falla el gate
        if: failure()
        shell: bash
        env:
          SECURITY_ALERT_WEBHOOK_URL: ${{ secrets.SECURITY_ALERT_WEBHOOK_URL }}
        run: |
          if [ -z "$SECURITY_ALERT_WEBHOOK_URL" ]; then
            echo "::notice::SECURITY_ALERT_WEBHOOK_URL no configurado; se omite alerta externa."
            exit 0
          fi

          payload=$(jq -n \
            --arg repository "${{ github.repository }}" \
            --arg actor "${{ github.actor }}" \
            --arg workflow "${{ github.workflow }}" \
            --arg run_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --arg ref "${{ github.ref }}" \
            '{repository: $repository, actor: $actor, workflow: $workflow, ref: $ref, run_url: $run_url, status: "Bloqueado y Revertido"}')

          curl --fail --silent --show-error \
            -H "Content-Type: application/json" \
            -d "$payload" \
            "$SECURITY_ALERT_WEBHOOK_URL"
