name: Corporate DevSecOps Gate

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: security-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security_audits:
    name: Pruebas de Seguridad y Calidad
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bloquear archivos sensibles versionados
        shell: bash
        run: bash .github/devsecops/scripts/block-sensitive-files.sh

      - name: Detectar cambios de aplicacion
        id: app_changes
        shell: bash
        run: bash .github/devsecops/scripts/detect-app-changes.sh

      - name: Preparar reglas corporativas de secretos (Estricto / Multi-idioma)
        shell: bash
        run: bash .github/devsecops/scripts/prepare-gitleaks-config.sh

      - name: Escaneo de secretos hardcodeados (Gitleaks CLI)
        shell: bash
        env:
          WORKSPACE_PATH: ${{ github.workspace }}
        run: |
          docker run --rm \
            -v "$WORKSPACE_PATH:/repo" \
            -w /repo \
            ghcr.io/gitleaks/gitleaks:v8.24.2 \
            git . --config .gitleaks-ci.toml --redact --verbose --exit-code 1

      - name: Configurar Python para Semgrep
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Analisis estatico de seguridad (Semgrep SAST)
        shell: bash
        run: |
          python -m pip install --upgrade pipx
          pipx install semgrep
          semgrep scan \
            --config p/default \
            --config p/security-audit \
            --config p/secrets \
            --config p/javascript \
            --config p/nodejs \
            --error \
            --metrics=off

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validar sintaxis JavaScript
        shell: bash
        run: bash .github/devsecops/scripts/validate-js.sh

      - name: Auditoria de dependencias Node.js en Subcarpetas (SCA)
        shell: bash
        run: bash .github/devsecops/scripts/audit-node-deps.sh

      - name: Detectar dependencias no utilizadas en Subcarpetas
        shell: bash
        run: bash .github/devsecops/scripts/detect-unused-deps.sh

      - name: Rollback automatico
        if: failure() && github.event_name == 'push'
        shell: bash
        env:
          SHA_TO_REVERT: ${{ github.sha }}
          REF_NAME: ${{ github.ref_name }}
        run: bash .github/devsecops/scripts/rollback.sh

      - name: Auto-Aprovisionamiento en Vercel (API)
        id: vercel_provisioning
        if: success() && github.event_name == 'push' && steps.app_changes.outputs.changed == 'true'
        shell: bash
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN || secrets.VERCEL_TOKEN_SECRET }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID || secrets.VERCEL_ORG_ID }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: bash .github/devsecops/scripts/vercel-provision.sh

      - name: Inyectar Edge Firewall corporativo
        if: success() && github.event_name == 'push' && steps.app_changes.outputs.changed == 'true'
        shell: bash
        run: bash .github/devsecops/scripts/inject-edge-firewall.sh

      - name: Despliegue en Vercel (Produccion)
        if: success() && github.event_name == 'push' && steps.app_changes.outputs.changed == 'true'
        shell: bash
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN || secrets.VERCEL_TOKEN_SECRET }}
          RESOLVED_PROJECT_ID: ${{ steps.vercel_provisioning.outputs.project_id }}
          VERCEL_TEAM_ID: ${{ steps.vercel_provisioning.outputs.team_id }}
        run: bash .github/devsecops/scripts/vercel-deploy.sh

      - name: Alertar a Ciberseguridad si falla el workflow
        if: always() && failure()
        shell: bash
        env:
          SECURITY_ALERT_WEBHOOK_URL: ${{ secrets.SECURITY_ALERT_WEBHOOK_URL }}
          ALERT_REPOSITORY: ${{ github.repository }}
          ALERT_ACTOR: ${{ github.actor }}
          ALERT_WORKFLOW: ${{ github.workflow }}
          ALERT_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ALERT_REF: ${{ github.ref }}
        run: bash .github/devsecops/scripts/send-alert.sh
