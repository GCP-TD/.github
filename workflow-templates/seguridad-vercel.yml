name: Corporate DevSecOps Gate

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: security-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security_audits:
    name: Pruebas de Seguridad y Calidad
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bloquear archivos sensibles versionados
        shell: bash
        run: |
          blocked_files=$(git ls-files | grep -E '(^|/)\.env($|\.|/)|(^|/).*\.(pem|p12|pfx|key)$|(^|/)id_rsa$|(^|/)id_ed25519$|(^|/)credentials\.json$|(^|/)service-account.*\.json$' | grep -vE '(^|/)\.env\.example$' || true)

          if [ -n "$blocked_files" ]; then
            echo "::error::Archivos sensibles versionados detectados. No se permite publicar .env, llaves privadas, certificados ni credenciales."
            printf '%s\n' "$blocked_files"
            exit 1
          fi

      - name: Preparar reglas corporativas de secretos (Estricto / Multi-idioma)
        shell: bash
        run: |
          cat > .gitleaks-ci.toml <<'EOF'
          title = "Corporate DevSecOps Gitleaks Config - Strict"

          [extend]
          useDefault = true

          [[rules]]
          id = "corporate-strict-hardcoded-secret"
          description = "Detects generic hardcoded credentials in English and Spanish, including short or weak values."
          regex = '''(?i)(?:secret|token|api[_-]?key|access[_-]?key|client[_-]?secret|private[_-]?key|password|passwd|pwd|llave|clave|contrasena|secreto)[A-Za-z0-9_-]*\s*[:=]\s*['"`]([A-Za-z0-9_./+=:@-]{4,})['"`]'''
          secretGroup = 1
          keywords = [
            "secret",
            "token",
            "api_key",
            "apikey",
            "access_key",
            "client_secret",
            "private_key",
            "password",
            "passwd",
            "pwd",
            "llave",
            "clave",
            "contrasena",
            "secreto"
          ]
          EOF

      - name: Escaneo de secretos hardcodeados (Gitleaks CLI)
        shell: bash
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/repo" \
            -w /repo \
            ghcr.io/gitleaks/gitleaks:v8.24.2 \
            git . --config .gitleaks-ci.toml --redact --verbose --exit-code 1

      - name: Configurar Python para Semgrep
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Analisis estatico de seguridad (Semgrep SAST)
        shell: bash
        run: |
          python -m pip install --upgrade pipx
          pipx install semgrep
          semgrep scan \
            --config p/default \
            --config p/security-audit \
            --config p/secrets \
            --config p/javascript \
            --config p/nodejs \
            --error \
            --metrics=off

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validar sintaxis JavaScript
        shell: bash
        run: |
          mapfile -d '' files < <(find . \
            -type f \( -name '*.js' -o -name '*.mjs' -o -name '*.cjs' \) \
            -not -path '*/node_modules/*' \
            -not -path '*/.git/*' \
            -print0)

          if [ "${#files[@]}" -eq 0 ]; then
            echo "No se encontraron archivos JavaScript para validar."
            exit 0
          fi

          for file in "${files[@]}"; do
            node --check "$file"
          done

      - name: Auditoria de dependencias Node.js en Subcarpetas (SCA)
        shell: bash
        run: |
          mapfile -d '' package_files < <(find . -name "package.json" -not -path "*/node_modules/*" -print0)
          
          if [ ${#package_files[@]} -eq 0 ]; then
            echo "::notice::No existe package.json en ningun directorio; se omite npm audit."
            exit 0
          fi
          
          for pkg in "${package_files[@]}"; do
            dir=$(dirname "$pkg")
            echo "::group::Auditando directorio: $dir"
            pushd "$dir" > /dev/null
            
            if [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ]; then
              npm ci --ignore-scripts
            else
              npm install --package-lock-only --ignore-scripts
            fi
            
            npm audit --audit-level=high
            popd > /dev/null
            echo "::endgroup::"
          done

      - name: Detectar dependencias no utilizadas en Subcarpetas
        shell: bash
        run: |
          mapfile -d '' package_files < <(find . -name "package.json" -not -path "*/node_modules/*" -print0)
          
          if [ ${#package_files[@]} -eq 0 ]; then
            echo "::notice::No existe package.json; se omite depcheck."
            exit 0
          fi
          
          for pkg in "${package_files[@]}"; do
            dir=$(dirname "$pkg")
            echo "::group::Revisando dependencias huerfanas en: $dir"
            pushd "$dir" > /dev/null
            
            # Ejecutamos depcheck y guardamos la salida, omitiendo fallos temporales de la propia herramienta
            npx --yes depcheck --json > depcheck-results.json || true
            
            node <<'NODE'
            const fs = require('fs');
            let report;
            try {
              report = JSON.parse(fs.readFileSync('depcheck-results.json', 'utf8'));
            } catch (e) {
              console.error('No se pudo procesar depcheck-results.json.');
              process.exit(0);
            }
            
            const unused = [
              ...(report.dependencies || []),
              ...(report.devDependencies || []),
            ];
            
            if (unused.length > 0) {
              console.error('Se detectaron dependencias no utilizadas en esta ruta:');
              for (const dependency of unused) {
                console.error(`- ${dependency}`);
              }
              process.exit(1);
            }
            console.log('Todas las dependencias estan en uso correcto.');
          NODE
            
            popd > /dev/null
            echo "::endgroup::"
          done

      - name: Rollback automatico en main
        if: failure() && github.event_name == 'push'
        shell: bash
        env:
          SHA_TO_REVERT: ${{ github.sha }}
        run: |
          echo "::warning::Vulnerabilidad detectada. Iniciando rollback automatico..."
          git config --global user.name "DevSecOps Gate"
          git config --global user.email "ciberseguridad@casapellas.com"
          
          # Deteccion de merge commit o push directo
          if git show -s --format=%P "$SHA_TO_REVERT" | grep -q ' '; then
            git revert --no-edit -m 1 "$SHA_TO_REVERT"
          else
            git revert --no-edit "$SHA_TO_REVERT"
          fi
          
          git push origin main
          echo "::notice::El codigo vulnerable ha sido revertido exitosamente."

      - name: Alertar a Ciberseguridad si falla el gate
        if: failure()
        shell: bash
        env:
          SECURITY_ALERT_WEBHOOK_URL: ${{ secrets.SECURITY_ALERT_WEBHOOK_URL }}
          ALERT_REPOSITORY: ${{ github.repository }}
          ALERT_ACTOR: ${{ github.actor }}
          ALERT_WORKFLOW: ${{ github.workflow }}
          ALERT_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ALERT_REF: ${{ github.ref }}
        run: |
          if [ -z "$SECURITY_ALERT_WEBHOOK_URL" ]; then
            echo "::notice::SECURITY_ALERT_WEBHOOK_URL no configurado; se omite alerta externa."
            exit 0
          fi

          repo_name="${ALERT_REPOSITORY#*/}"
          owner_user="${repo_name%%_*}"
          if [ -z "$owner_user" ] || [ "$owner_user" = "$repo_name" ]; then
            owner_user="$ALERT_ACTOR"
          fi

          security_alert_to="ciberseguridad@casapellas.com"
          owner_email="${owner_user}@casapellas.com"
          alert_recipients="${security_alert_to};${owner_email}"

          payload=$(jq -n \
            --arg repository "$ALERT_REPOSITORY" \
            --arg actor "$ALERT_ACTOR" \
            --arg workflow "$ALERT_WORKFLOW" \
            --arg run_url "$ALERT_RUN_URL" \
            --arg ref "$ALERT_REF" \
            --arg alert_to "$security_alert_to" \
            --arg owner_email "$owner_email" \
            --arg email "$alert_recipients" \
            --arg to "$alert_recipients" \
            '{repository: $repository, actor: $actor, email: $email, workflow: $workflow, ref: $ref, run_url: $run_url, status: "Bloqueado y Revertido", alert_to: $alert_to, owner_email: $owner_email, to: $to, emailMessage: {To: $email, Subject: ("Alerta DevSecOps: " + $repository), Body: ("El gate bloqueo y revirtio cambios en " + $repository + ". Run: " + $run_url)}}')

          curl --fail --silent --show-error \
            -H "Content-Type: application/json" \
            -d "$payload" \
            "$SECURITY_ALERT_WEBHOOK_URL"

      - name: Despliegue en Vercel (Produccion)
        if: success() && github.event_name == 'push'
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN_SECRET }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-args: '--prod --yes'
